name: Build SnapKey EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build SnapKey
      run: |
        cl SnapKey.cpp user32.lib shell32.lib /O2 /std:c++17 /EHsc /FeSnapKey.exe

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: SnapKey-build
        path: SnapKey.exe
